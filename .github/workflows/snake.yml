name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Taf0711
          outputs: |
            output/github-snake.svg
            output/github-snake-dark.svg?palette=github-dark
      - name: Hide progress bar
        run: |
          mkdir -p out
          for f in output/github-snake.svg output/github-snake-dark.svg; do
            sed -E 's/<rect class="u u[0-9]"[^>]*\/>//g' "$f" > "out/$(basename "$f")"
          done
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: out
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
